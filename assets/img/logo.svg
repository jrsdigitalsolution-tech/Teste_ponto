<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" role="img" aria-label="Vie Medicina e Saúde">
  <defs>
    <linearGradient id="teal" x1="30" y1="30" x2="260" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#006f78"/>
      <stop offset="0.55" stop-color="#008b96"/>
      <stop offset="1" stop-color="#9dcfd0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#006f78" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="320" height="220" rx="38" fill="#f7fbfa"/>
  <text x="40" y="126" fill="url(#teal)" filter="url(#shadow)" font-family="Georgia, 'Times New Roman', serif" font-size="96" font-style="italic">Vie</text>
  <text x="210" y="118" fill="#9dcfd0" font-family="Georgia, 'Times New Roman', serif" font-size="74" font-style="italic">!</text>
  <text x="56" y="166" fill="#8a8f92" font-family="Arial, Helvetica, sans-serif" font-size="23" font-style="italic">Medicina e Saúde</text>
</svg>
